name: Sync Wiki Roadmap

on:
  push:
    branches:
      - main
    paths:
      - project-status.json
      - scripts/update-roadmap.ps1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki-roadmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" .wiki-sync

      - name: Generate roadmap for repo and wiki
        shell: pwsh
        run: |
          ./scripts/update-roadmap.ps1 -WikiRoadmapFile ./.wiki-sync/Roadmap.md

      - name: Commit and push wiki changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd .wiki-sync
          if git diff --quiet -- Roadmap.md; then
            echo "No wiki roadmap changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Roadmap.md
          git commit -m "Update wiki roadmap"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" HEAD:master
